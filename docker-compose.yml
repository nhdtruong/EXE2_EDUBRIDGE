services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: edubridge-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "EduBridge_Test_2026!"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - edubridge_sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'EduBridge_Test_2026!' -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  edubridge_sql_data:
