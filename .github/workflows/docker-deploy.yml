name: Build And Deploy Docker

on:
  push:
    branches:
      - release
  workflow_dispatch:

env:
  IMAGE_REPOSITORY: edubridge-backend
  VPS_DEPLOY_PATH: /root/edubridge

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.prod.yml,.env.production.example,docker,edubridge_database"
          target: ${{ env.VPS_DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -eu
            APP_IMAGE_VALUE="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPOSITORY }}:latest"
            mkdir -p "${{ env.VPS_DEPLOY_PATH }}"
            cd "${{ env.VPS_DEPLOY_PATH }}"

            if [ ! -f .env ]; then
              cp .env.production.example .env
              echo ".env was missing. Template created at ${{ env.VPS_DEPLOY_PATH }}/.env"
              echo "Update .env on the VPS, then rerun the workflow."
              exit 1
            fi

            if grep -q '^APP_IMAGE=' .env; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${APP_IMAGE_VALUE}|" .env
            else
              printf '\nAPP_IMAGE=%s\n' "${APP_IMAGE_VALUE}" >> .env
            fi

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
