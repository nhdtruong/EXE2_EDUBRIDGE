<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>EduBridge Pagination Export</title>
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/pagination.css">
</head>
<body class="ds-page">
    <h1 class="ds-page-title">Pagination</h1>
    <div class="ds-card" style="margin-top:24px">
        <div class="ds-pagination">
            <div class="ds-pagination-pages">
                <a class="ds-page-link ds-page-link-disabled">«</a>
                <a class="ds-page-link ds-page-link-disabled">‹</a>
                <a class="ds-page-link ds-page-link-active">1</a>
                <a class="ds-page-link">2</a>
                <a class="ds-page-link">›</a>
                <a class="ds-page-link">»</a>
            </div>
            <div class="ds-pagination-meta">
                <span>Tổng số: 6 bản ghi</span>
                <select class="ds-page-size">
                    <option>10</option>
                    <option selected>20</option>
                    <option>50</option>
                    <option>100</option>
                    <option>200</option>
                    <option>500</option>
                </select>
            </div>
        </div>
    </div>
</body>
</html>
