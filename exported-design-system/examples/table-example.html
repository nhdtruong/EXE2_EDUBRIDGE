<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>EduBridge Table Export</title>
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/tables.css">
    <link rel="stylesheet" href="../css/icons.css">
    <link rel="stylesheet" href="../css/toggle.css">
</head>
<body class="ds-page">
    <h1 class="ds-page-title">Table</h1>
    <div class="ds-card" style="margin-top:24px">
        <div class="ds-table-wrap">
            <table class="ds-table">
                <thead>
                    <tr>
                        <th class="ds-table-center">STT</th>
                        <th class="ds-table-center">ID</th>
                        <th>Giáo viên</th>
                        <th>Liên hệ</th>

                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="ds-table-center">1</td>
                        <td class="ds-table-center">6</td>
                        <td>
                            <div class="ds-entity">
                                <span class="ds-avatar">TE</span>
                                <div>
                                    <div class="ds-entity-title">Test</div>
                                    <div class="ds-entity-subtitle">Mã: GV-1-0003</div>
                                </div>
                            </div>
                        </td>
                        <td>teacher@example.com<br>0987654359</td>
                        <td class="ds-table-center"><span class="ds-badge ds-badge-success">Đang hoạt động</span></td>
                        <td>
                            <div class="ds-table-actions">
                                <button class="ds-icon-btn ds-icon-btn-view">◎</button>
                                <button class="ds-icon-btn ds-icon-btn-delete">⌫</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
