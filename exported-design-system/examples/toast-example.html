<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>EduBridge Toast Export</title>
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/toast.css">
</head>
<body class="ds-page">
    <h1 class="ds-page-title">Toast</h1>
    <div class="ds-toast-container">
        <div class="ds-toast ds-toast-success">
            <div>
                <p class="ds-toast-title">Thành công</p>
                <p class="ds-toast-message">Cập nhật dữ liệu thành công.</p>
            </div>
            <button class="ds-toast-close">×</button>
        </div>
        <div class="ds-toast ds-toast-error">
            <div>
                <p class="ds-toast-title">Thất bại</p>
                <p class="ds-toast-message">Không thể lưu thay đổi.</p>
            </div>
            <button class="ds-toast-close">×</button>
        </div>
    </div>
</body>
</html>
