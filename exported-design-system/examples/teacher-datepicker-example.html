<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>EduBridge Teacher Datepicker Export</title>
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/datepicker.css">
</head>
<body class="ds-page">
    <h1 class="ds-page-title">Datepicker cho quản lý giáo viên</h1>
    <p class="ds-page-subtitle">Input hiển thị dd/mm/yyyy, hidden input gửi yyyy-MM-dd cho backend Spring.</p>

    <form class="ds-card" style="margin-top:24px;padding:20px;max-width:900px">
        <div class="ds-form-grid">
            <div class="ds-form-field">
                <label class="ds-label" for="teacherName">Tên giáo viên (*)</label>
                <input id="teacherName" class="ds-input" name="teacherName" placeholder="Nhập tên giáo viên">
            </div>

            <div class="ds-form-field">
                <label class="ds-label" for="dateOfBirthDisplay">Ngày sinh (*)</label>
                <div class="ds-datepicker" data-ds-datepicker>
                    <input type="hidden" name="dateOfBirth" value="2004-12-17" data-ds-date-value>
                    <div class="ds-datepicker-field">
                        <input id="dateOfBirthDisplay" class="ds-datepicker-input" type="text" placeholder="dd/mm/yyyy" data-ds-date-display>
                        <button type="button" class="ds-datepicker-button" data-ds-date-toggle aria-label="Chọn ngày">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3M4 11h16M5 5h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V6a1 1 0 011-1z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="ds-form-field">
                <label class="ds-label" for="identityIssuedDisplay">Ngày cấp</label>
                <div class="ds-datepicker" data-ds-datepicker>
                    <input type="hidden" name="identityIssuedDate" data-ds-date-value>
                    <div class="ds-datepicker-field">
                        <input id="identityIssuedDisplay" class="ds-datepicker-input" type="text" placeholder="dd/mm/yyyy" data-ds-date-display>
                        <button type="button" class="ds-datepicker-button" data-ds-date-toggle aria-label="Chọn ngày">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3M4 11h16M5 5h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V6a1 1 0 011-1z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <script src="../js/datepicker.js"></script>
</body>
</html>
